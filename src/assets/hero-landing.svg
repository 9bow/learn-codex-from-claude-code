<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" role="img" aria-label="Claude Code에서 Codex로의 마이그레이션">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </linearGradient>
    <linearGradient id="claude-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="codex-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="480" height="360" fill="url(#bg)" rx="18"/>
  <!-- Decorative grid -->
  <g stroke="#1e293b" stroke-width="1">
    <line x1="0" y1="80" x2="480" y2="80"/>
    <line x1="0" y1="160" x2="480" y2="160"/>
    <line x1="0" y1="240" x2="480" y2="240"/>
    <line x1="120" y1="0" x2="120" y2="360"/>
    <line x1="240" y1="0" x2="240" y2="360"/>
    <line x1="360" y1="0" x2="360" y2="360"/>
  </g>
  <!-- Claude orb -->
  <g filter="url(#glow)">
    <circle cx="120" cy="180" r="60" fill="url(#claude-g)" opacity="0.85"/>
    <text x="120" y="186" text-anchor="middle" font-family="system-ui" font-size="22" font-weight="700" fill="#0f172a">Claude</text>
  </g>
  <!-- Codex orb -->
  <g filter="url(#glow)">
    <circle cx="360" cy="180" r="60" fill="url(#codex-g)" opacity="0.9"/>
    <text x="360" y="186" text-anchor="middle" font-family="system-ui" font-size="22" font-weight="700" fill="#0f172a">Codex</text>
  </g>
  <!-- Connecting flow -->
  <g>
    <path d="M180,180 C 220,140 260,140 300,180" stroke="#94a3b8" stroke-width="2" fill="none" stroke-dasharray="4 4"/>
    <path d="M180,180 C 220,220 260,220 300,180" stroke="#94a3b8" stroke-width="2" fill="none" stroke-dasharray="4 4"/>
    <polygon points="298,176 310,180 298,184" fill="#94a3b8"/>
  </g>
  <!-- Code symbols -->
  <g font-family="ui-monospace, monospace" font-size="11" fill="#e2e8f0" opacity="0.85">
    <text x="40" y="50">CLAUDE.md</text>
    <text x="40" y="320">.claude/skills/</text>
    <text x="290" y="50">AGENTS.md</text>
    <text x="290" y="320">.agents/skills/</text>
  </g>
  <text x="240" y="340" text-anchor="middle" font-family="system-ui" font-size="11" fill="#94a3b8" font-style="italic">migration in progress…</text>
</svg>
